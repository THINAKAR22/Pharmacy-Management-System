<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sell Medicine - Pharmacy Management</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="nav-logo">Pharmacy Management System</h1>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="add-medicine.html">Add Medicine</a></li>
                <li><a href="sell-medicine.html" class="active">Sell Medicine</a></li>
                <li><a href="inventory.html">Inventory</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <h1>Sell Medicine</h1>
        
        <div class="sale-container">
            <div class="search-section">
                <h3>Search Medicine</h3>
                <div class="search-box">
                    <input type="text" id="medicineSearch" placeholder="Search by medicine name...">
                    <button onclick="searchMedicine()" class="btn btn-primary">Search</button>
                </div>
                <div id="searchResults" class="search-results"></div>
            </div>

            <div class="cart-section">
                <h3>Shopping Cart</h3>
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Medicine</th>
                                <th>Price</th>
                                <th>Quantity</th>
                                <th>Total</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="cartItems"></tbody>
                    </table>
                </div>
                
                <div class="cart-summary">
                    <div class="summary-row">
                        <strong>Total Items:</strong>
                        <span id="totalItems">0</span>
                    </div>
                    <div class="summary-row">
                        <strong>Subtotal:</strong>
                        <span id="subtotal">₹0.00</span>
                    </div>
                    <div class="summary-row total">
                        <strong>Total:</strong>
                        <span id="total">₹0.00</span>
                    </div>
                </div>

                <div class="customer-details">
                    <h4>Customer Details</h4>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="customerName">Customer Name:</label>
                            <input type="text" id="customerName" value="Walk-in Customer">
                        </div>
                        <div class="form-group">
                            <label for="customerPhone">Phone Number:</label>
                            <input type="tel" id="customerPhone">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="paymentMethod">Payment Method:</label>
                        <select id="paymentMethod" required>
                            <option value="Cash">Cash</option>
                            <option value="Card">Card</option>
                            <option value="UPI">UPI</option>
                            <option value="Insurance">Insurance</option>
                        </select>
                    </div>
                </div>

                <div class="sale-actions">
                    <button onclick="completeSale()" class="btn btn-success">Complete Sale</button>
                    <button onclick="clearCart()" class="btn btn-secondary">Clear Cart</button>
                </div>
            </div>
        </div>

        <div id="message" class="message" style="display: none;"></div>
    </div>

    <script src="js/sellMedicine.js"></script>
</body>
</html>
